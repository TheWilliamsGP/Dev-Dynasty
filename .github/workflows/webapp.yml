name: Test C# Web App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore WebApp/NpoSolution.sln
    
    - name: Build
      run: dotnet build WebApp/NpoSolution.sln --no-restore --configuration Release
    
    - name: Run tests
      run: dotnet test WebApp/NpoSolution.sln --no-build --verbosity normal
